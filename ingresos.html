<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GASTOS · Ingresos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="ingresos">
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-head">
        <div><h1>Ingresos</h1><p>Cobro de sueldo y otros ingresos</p></div>
        <button class="btn" id="addBtn">+ Registrar ingreso</button>
      </div>

      <div class="grid cols-3" id="ingStats" style="margin-bottom:18px"></div>

      <div class="card" id="recCard" style="margin-bottom:18px"></div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Fuente</th><th>Descripción</th><th>Recurrente</th><th class="num">Monto</th><th></th></tr></thead>
            <tbody id="ingBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/format.js"></script>
  <script src="js/store.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ingresos.js"></script>
</body>
</html>
